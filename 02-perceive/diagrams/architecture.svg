<svg viewBox="0 0 880 640" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace,Menlo,monospace">
  <defs>
    <marker id="b" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8a8578"/>
    </marker>
    <marker id="bm" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5ed7a6"/>
    </marker>
  </defs>
  <rect width="880" height="640" rx="16" fill="#0d0a18"/>
  <text x="30" y="40" fill="#efe9dc" font-size="17" font-weight="bold">Level 2 · Reason — the specialist crew (full multi-agent system)</text>
  <text x="30" y="60" fill="#8a8578" font-size="11">parallel fan-out · two MCP patterns · multimodal evidence (image + video/audio) · deterministic gate</text>

  <!-- evidence -->
  <rect x="30" y="86" width="200" height="112" rx="12" fill="none" stroke="#fbbf24" stroke-width="1.2"/>
  <text x="130" y="108" fill="#fbbf24" font-size="11" text-anchor="middle">generate_evidence.py</text>
  <text x="130" y="128" fill="#efe9dc" font-size="10" text-anchor="middle">soil + stars · one chat session</text>
  <text x="130" y="145" fill="#efe9dc" font-size="10" text-anchor="middle">flora VIDEO · Veo (native audio)</text>
  <text x="130" y="169" fill="#8a8578" font-size="9.5" text-anchor="middle">↑ upload</text>
  <text x="130" y="186" fill="#7cc7ff" font-size="10.5" text-anchor="middle">GCS · gs://…/evidence/*</text>

  <!-- callback -->
  <rect x="300" y="100" width="190" height="56" rx="10" fill="none" stroke="#8a8578" stroke-width="1.2"/>
  <text x="395" y="123" fill="#efe9dc" font-size="11" text-anchor="middle">before_agent_callback</text>
  <text x="395" y="140" fill="#8a8578" font-size="9.5" text-anchor="middle">urls + x,y → session STATE</text>
  <line x1="230" y1="128" x2="298" y2="128" stroke="#8a8578" stroke-width="1.2" marker-end="url(#b)"/>

  <!-- SequentialAgent frame -->
  <rect x="30" y="228" width="820" height="300" rx="14" fill="none" stroke="#8b5cf6" stroke-width="1.4" stroke-dasharray="6 4"/>
  <text x="46" y="250" fill="#8b5cf6" font-size="11" letter-spacing="2">MissionAnalysisAI · SequentialAgent</text>
  <line x1="395" y1="156" x2="395" y2="226" stroke="#8a8578" stroke-width="1.2" marker-end="url(#b)"/>
  <text x="405" y="196" fill="#8a8578" font-size="9">{soil_url} {flora_url} {stars_url} {x} {y}</text>

  <!-- ParallelAgent -->
  <rect x="50" y="264" width="500" height="240" rx="12" fill="#8b5cf6" fill-opacity="0.05" stroke="#8b5cf6" stroke-width="1.1"/>
  <text x="66" y="286" fill="#a78bfa" font-size="10" letter-spacing="1">EvidenceAnalysisCrew · ParallelAgent (concurrent)</text>

  <rect x="70" y="300" width="140" height="60" rx="10" fill="#7cc7ff" fill-opacity="0.08" stroke="#7cc7ff" stroke-width="1.2"/>
  <text x="140" y="322" fill="#efe9dc" font-size="11" text-anchor="middle">Geological</text>
  <text x="140" y="338" fill="#8a8578" font-size="9" text-anchor="middle">soil IMAGE</text>
  <text x="140" y="352" fill="#8a8578" font-size="9" text-anchor="middle">output_key: geo_report</text>

  <rect x="230" y="300" width="140" height="60" rx="10" fill="#5ed7a6" fill-opacity="0.08" stroke="#5ed7a6" stroke-width="1.2"/>
  <text x="300" y="322" fill="#efe9dc" font-size="11" text-anchor="middle">Botanical</text>
  <text x="300" y="338" fill="#8a8578" font-size="9" text-anchor="middle">flora VIDEO + AUDIO</text>
  <text x="300" y="352" fill="#8a8578" font-size="9" text-anchor="middle">output_key: bot_report</text>

  <rect x="390" y="300" width="140" height="60" rx="10" fill="#fbbf24" fill-opacity="0.08" stroke="#fbbf24" stroke-width="1.2"/>
  <text x="460" y="322" fill="#efe9dc" font-size="11" text-anchor="middle">Astronomical</text>
  <text x="460" y="338" fill="#8a8578" font-size="9" text-anchor="middle">star image → SQL</text>
  <text x="460" y="352" fill="#8a8578" font-size="9" text-anchor="middle">output_key: astro_report</text>

  <!-- custom MCP -->
  <rect x="70" y="404" width="300" height="80" rx="12" fill="none" stroke="#7cc7ff" stroke-width="1.3"/>
  <text x="220" y="426" fill="#7cc7ff" font-size="10.5" text-anchor="middle">CUSTOM MCP · location-analyzer (FastMCP · Cloud Run)</text>
  <text x="220" y="446" fill="#efe9dc" font-size="10" text-anchor="middle">analyze_geological(image_url)</text>
  <text x="220" y="463" fill="#efe9dc" font-size="10" text-anchor="middle">analyze_botanical(video_url) — hears the soundtrack</text>
  <line x1="140" y1="360" x2="160" y2="402" stroke="#7cc7ff" stroke-width="1.1" marker-end="url(#b)"/>
  <line x1="300" y1="360" x2="280" y2="402" stroke="#5ed7a6" stroke-width="1.1" marker-end="url(#b)"/>
  <text x="90" y="497" fill="#8a8578" font-size="8.5">MCPToolset · StreamableHTTP · Part.from_uri(gs://…)</text>

  <!-- managed MCP -->
  <rect x="400" y="404" width="230" height="80" rx="12" fill="none" stroke="#fbbf24" stroke-width="1.3"/>
  <text x="515" y="426" fill="#fbbf24" font-size="10.5" text-anchor="middle">MANAGED MCP · BigQuery (Google-hosted)</text>
  <text x="515" y="446" fill="#efe9dc" font-size="10" text-anchor="middle">execute_sql_readonly → star_catalog</text>
  <text x="515" y="463" fill="#8a8578" font-size="9" text-anchor="middle">OAuth ADC · exact match, not vector search</text>
  <line x1="460" y1="360" x2="490" y2="402" stroke="#fbbf24" stroke-width="1.1" marker-end="url(#b)"/>

  <!-- synthesizer -->
  <rect x="600" y="300" width="220" height="82" rx="12" fill="#8b5cf6" fill-opacity="0.08" stroke="#8b5cf6" stroke-width="1.3"/>
  <text x="710" y="323" fill="#efe9dc" font-size="11.5" text-anchor="middle">MissionSynthesizer</text>
  <text x="710" y="341" fill="#8a8578" font-size="9.5" text-anchor="middle">reads {geo/bot/astro_report}</text>
  <text x="710" y="358" fill="#efe9dc" font-size="10" text-anchor="middle">2-of-3 consensus</text>
  <text x="710" y="374" fill="#8a8578" font-size="9.5" text-anchor="middle">then confirm_location(biome)</text>
  <line x1="550" y1="330" x2="598" y2="330" stroke="#8a8578" stroke-width="1.2" marker-end="url(#b)"/>
  <text x="574" y="322" fill="#8a8578" font-size="8.5" text-anchor="middle">state</text>

  <!-- gate -->
  <rect x="600" y="420" width="220" height="72" rx="12" fill="#5ed7a6" fill-opacity="0.08" stroke="#5ed7a6" stroke-width="1.3"/>
  <text x="710" y="444" fill="#5ed7a6" font-size="11.5" text-anchor="middle">confirm_location — CODE</text>
  <text x="710" y="462" fill="#8a8578" font-size="9.5" text-anchor="middle">biome vs (x,y) the model never saw</text>
  <text x="710" y="479" fill="#efe9dc" font-size="10" text-anchor="middle">✓ BEACON ACTIVATED → beacon.json</text>
  <line x1="710" y1="382" x2="710" y2="418" stroke="#5ed7a6" stroke-width="1.2" marker-end="url(#bm)"/>

  <text x="30" y="566" fill="#514b5e" font-size="10">two MCP patterns, one client wiring: a server YOU author vs one Google hosts — the agent consumes both through MCPToolset</text>
  <text x="30" y="586" fill="#514b5e" font-size="10">verified run: 3/3 VERDANT · the astronomer's quadrant came out of BigQuery · the botanist heard "water dripping, insect calls"</text>
</svg>
