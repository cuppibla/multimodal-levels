<svg viewBox="0 0 880 560" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace,Menlo,monospace">
  <defs>
    <marker id="d" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8a8578"/>
    </marker>
    <marker id="dv" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#a78bfa"/>
    </marker>
    <marker id="dm" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5ed7a6"/>
    </marker>
  </defs>
  <rect width="880" height="560" rx="16" fill="#0d0a18"/>
  <text x="30" y="40" fill="#efe9dc" font-size="17" font-weight="bold">Level 6 · Recall — real cross-session memory</text>
  <text x="30" y="60" fill="#8a8578" font-size="11">the session is EVIDENCE, not memory · route each fact to the store that fits its shape</text>

  <!-- agent on cloud run -->
  <rect x="30" y="96" width="300" height="200" rx="14" fill="none" stroke="#fb7185" stroke-width="1.3"/>
  <text x="180" y="120" fill="#fb7185" font-size="11" text-anchor="middle" letter-spacing="1">RESCUE OPS AGENT · CLOUD RUN</text>
  <rect x="50" y="136" width="260" height="44" rx="10" fill="none" stroke="#8a8578" stroke-width="1"/>
  <text x="180" y="155" fill="#efe9dc" font-size="10.5" text-anchor="middle">PreloadMemoryTool()</text>
  <text x="180" y="171" fill="#8a8578" font-size="9" text-anchor="middle">READ — retrieves + injects before the model runs</text>
  <rect x="50" y="190" width="260" height="44" rx="10" fill="none" stroke="#8a8578" stroke-width="1"/>
  <text x="180" y="209" fill="#efe9dc" font-size="10.5" text-anchor="middle">save_exact_fact / get_exact_facts</text>
  <text x="180" y="225" fill="#8a8578" font-size="9" text-anchor="middle">state["user:callsign"] = "Vega-7"</text>
  <rect x="50" y="244" width="260" height="38" rx="10" fill="none" stroke="#8a8578" stroke-width="1"/>
  <text x="180" y="261" fill="#efe9dc" font-size="10.5" text-anchor="middle">add_session_to_memory(session)</text>
  <text x="180" y="276" fill="#8a8578" font-size="9" text-anchor="middle">WRITE — fired when the session ends</text>

  <!-- agent engine -->
  <rect x="480" y="86" width="370" height="290" rx="14" fill="#a78bfa" fill-opacity="0.05" stroke="#a78bfa" stroke-width="1.4" stroke-dasharray="6 4"/>
  <text x="665" y="110" fill="#a78bfa" font-size="11" text-anchor="middle" letter-spacing="1">ONE VERTEX AI AGENT ENGINE (managed)</text>

  <rect x="500" y="128" width="330" height="104" rx="12" fill="#5ed7a6" fill-opacity="0.07" stroke="#5ed7a6" stroke-width="1.2"/>
  <text x="665" y="150" fill="#5ed7a6" font-size="11" text-anchor="middle">MEMORY BANK — patterns, by meaning</text>
  <text x="665" y="170" fill="#efe9dc" font-size="9.5" text-anchor="middle">GENERATE: Gemini curates the transcript → consolidated facts</text>
  <text x="665" y="186" fill="#efe9dc" font-size="9.5" text-anchor="middle">RETRIEVE: similarity search per user_id scope</text>
  <text x="665" y="206" fill="#8a8578" font-size="9" text-anchor="middle">custom topics: survivor_context · comms_style</text>
  <text x="665" y="221" fill="#8a8578" font-size="9" text-anchor="middle">"long checklists overwhelm me → one step at a time"</text>

  <rect x="500" y="248" width="330" height="104" rx="12" fill="#7cc7ff" fill-opacity="0.07" stroke="#7cc7ff" stroke-width="1.2"/>
  <text x="665" y="270" fill="#7cc7ff" font-size="11" text-anchor="middle">SESSIONS + user: STATE — exact facts</text>
  <text x="665" y="290" fill="#efe9dc" font-size="9.5" text-anchor="middle">VertexAiSessionService — durable across sessions</text>
  <text x="665" y="308" fill="#8a8578" font-size="9" text-anchor="middle">user:callsign = Vega-7 · user:recycler_error_code = 42</text>
  <text x="665" y="326" fill="#8a8578" font-size="9" text-anchor="middle">looked up EXACTLY — you want your value,</text>
  <text x="665" y="340" fill="#8a8578" font-size="9" text-anchor="middle">not something similar to it</text>

  <!-- arrows -->
  <line x1="330" y1="158" x2="498" y2="170" stroke="#5ed7a6" stroke-width="1.2" marker-end="url(#dm)"/>
  <text x="410" y="152" fill="#5ed7a6" font-size="8.5">retrieve (read)</text>
  <line x1="330" y1="263" x2="498" y2="190" stroke="#5ed7a6" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#dm)"/>
  <text x="386" y="238" fill="#5ed7a6" font-size="8.5">generate (write)</text>
  <line x1="330" y1="212" x2="498" y2="295" stroke="#7cc7ff" stroke-width="1.2" marker-end="url(#dv)"/>
  <text x="392" y="272" fill="#7cc7ff" font-size="8.5">user: state r/w</text>

  <!-- the payoff timeline -->
  <text x="30" y="420" fill="#a78bfa" font-size="11" letter-spacing="2">THE PAYOFF — two separate processes, zero copying</text>
  <rect x="30" y="436" width="240" height="52" rx="10" fill="none" stroke="#8a8578" stroke-width="1.1"/>
  <text x="150" y="457" fill="#efe9dc" font-size="10.5" text-anchor="middle">SESSION A · "I'm Vega-7…"</text>
  <text x="150" y="474" fill="#8a8578" font-size="9" text-anchor="middle">facts told → flush to bank</text>
  <rect x="330" y="436" width="160" height="52" rx="10" fill="#5ed7a6" fill-opacity="0.06" stroke="#5ed7a6" stroke-width="1.1"/>
  <text x="410" y="457" fill="#5ed7a6" font-size="10.5" text-anchor="middle">consolidation</text>
  <text x="410" y="474" fill="#8a8578" font-size="9" text-anchor="middle">Gemini curates · ~seconds</text>
  <rect x="550" y="436" width="300" height="52" rx="10" fill="#a78bfa" fill-opacity="0.08" stroke="#a78bfa" stroke-width="1.2"/>
  <text x="700" y="457" fill="#efe9dc" font-size="10.5" text-anchor="middle">SESSION B (brand-new) — "I know your callsign is</text>
  <text x="700" y="474" fill="#efe9dc" font-size="10.5" text-anchor="middle">Vega-7… and how you like to be briefed."</text>
  <line x1="270" y1="462" x2="328" y2="462" stroke="#8a8578" stroke-width="1.2" marker-end="url(#d)"/>
  <line x1="490" y1="462" x2="548" y2="462" stroke="#8a8578" stroke-width="1.2" marker-end="url(#d)"/>

  <text x="30" y="528" fill="#514b5e" font-size="10">you do NOT have to host the agent inside Agent Engine — this one runs on Cloud Run and just points at the engine</text>
</svg>
