<svg viewBox="0 0 880 560" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace,Menlo,monospace">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8a8578"/>
    </marker>
    <marker id="am" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5ed7a6"/>
    </marker>
  </defs>
  <rect width="880" height="560" rx="16" fill="#0d0a18"/>
  <text x="30" y="40" fill="#efe9dc" font-size="17" font-weight="bold">Level 1 · Express — identity &amp; generation</text>
  <text x="30" y="60" fill="#8a8578" font-size="11">one model emits text + image · consistency = a session, not a seed · held app-wide by state + callback</text>

  <!-- lane 1: chat session -->
  <text x="30" y="98" fill="#7cc7ff" font-size="11" letter-spacing="2">① GENERATION IS A CONVERSATION (generator.py)</text>
  <rect x="30" y="110" width="150" height="54" rx="10" fill="none" stroke="#8a8578" stroke-width="1.2"/>
  <text x="105" y="133" fill="#efe9dc" font-size="12" text-anchor="middle">4-layer prompt</text>
  <text x="105" y="150" fill="#8a8578" font-size="9.5" text-anchor="middle">anchor·style·spec·SAME</text>

  <rect x="230" y="96" width="400" height="86" rx="12" fill="none" stroke="#7cc7ff" stroke-width="1.4" stroke-dasharray="5 4"/>
  <text x="430" y="88" fill="#7cc7ff" font-size="10" text-anchor="middle">ONE CHAT SESSION — state held across turns</text>
  <rect x="250" y="112" width="160" height="54" rx="10" fill="#7cc7ff" fill-opacity="0.08" stroke="#7cc7ff" stroke-width="1.2"/>
  <text x="330" y="135" fill="#efe9dc" font-size="12" text-anchor="middle">turn 1 · portrait</text>
  <text x="330" y="152" fill="#8a8578" font-size="9.5" text-anchor="middle">gemini-2.5-flash-image</text>
  <rect x="450" y="112" width="160" height="54" rx="10" fill="#7cc7ff" fill-opacity="0.08" stroke="#7cc7ff" stroke-width="1.2"/>
  <text x="530" y="135" fill="#efe9dc" font-size="12" text-anchor="middle">turn 2 · map icon</text>
  <text x="530" y="152" fill="#8a8578" font-size="9.5" text-anchor="middle">sees turn 1 → same face</text>
  <line x1="180" y1="139" x2="248" y2="139" stroke="#8a8578" stroke-width="1.2" marker-end="url(#a)"/>
  <line x1="410" y1="139" x2="448" y2="139" stroke="#8a8578" stroke-width="1.2" marker-end="url(#a)"/>
  <rect x="680" y="112" width="160" height="54" rx="10" fill="#5ed7a6" fill-opacity="0.08" stroke="#5ed7a6" stroke-width="1.2"/>
  <text x="760" y="135" fill="#5ed7a6" font-size="12" text-anchor="middle">verify.py gate</text>
  <text x="760" y="152" fill="#8a8578" font-size="9.5" text-anchor="middle">code judges · ✓ registered</text>
  <line x1="630" y1="139" x2="678" y2="139" stroke="#5ed7a6" stroke-width="1.2" marker-end="url(#am)"/>

  <!-- lane 2: ADK engine -->
  <text x="30" y="228" fill="#a78bfa" font-size="11" letter-spacing="2">② THE ADK CONSISTENCY ENGINE (agent/agent.py) — every call stays on-model</text>
  <rect x="30" y="242" width="180" height="92" rx="12" fill="#a78bfa" fill-opacity="0.08" stroke="#a78bfa" stroke-width="1.3"/>
  <text x="120" y="264" fill="#a78bfa" font-size="11" text-anchor="middle">session.state</text>
  <text x="120" y="283" fill="#efe9dc" font-size="10.5" text-anchor="middle">identity · who</text>
  <text x="120" y="299" fill="#efe9dc" font-size="10.5" text-anchor="middle">style · how</text>
  <text x="120" y="315" fill="#efe9dc" font-size="10.5" text-anchor="middle">ref image · pinned</text>

  <rect x="280" y="242" width="170" height="54" rx="10" fill="none" stroke="#8a8578" stroke-width="1.2"/>
  <text x="365" y="265" fill="#efe9dc" font-size="11.5" text-anchor="middle">before_agent_callback</text>
  <text x="365" y="282" fill="#8a8578" font-size="9.5" text-anchor="middle">locks identity once</text>

  <rect x="520" y="242" width="180" height="54" rx="10" fill="none" stroke="#8a8578" stroke-width="1.2"/>
  <text x="610" y="265" fill="#efe9dc" font-size="11.5" text-anchor="middle">generate_explorer_image</text>
  <text x="610" y="282" fill="#8a8578" font-size="9.5" text-anchor="middle">tool re-reads state + ref</text>

  <rect x="750" y="230" width="100" height="78" rx="10" fill="#5ed7a6" fill-opacity="0.08" stroke="#5ed7a6" stroke-width="1.2"/>
  <text x="800" y="258" fill="#efe9dc" font-size="11" text-anchor="middle">scene 1…N</text>
  <text x="800" y="276" fill="#5ed7a6" font-size="10.5" text-anchor="middle">SAME face</text>
  <text x="800" y="292" fill="#8a8578" font-size="9" text-anchor="middle">agent_01/02.png</text>

  <line x1="210" y1="269" x2="278" y2="269" stroke="#8a8578" stroke-width="1.2" marker-end="url(#a)"/>
  <text x="243" y="261" fill="#8a8578" font-size="8.5" text-anchor="middle">seeds</text>
  <line x1="450" y1="269" x2="518" y2="269" stroke="#8a8578" stroke-width="1.2" marker-end="url(#a)"/>
  <line x1="700" y1="269" x2="748" y2="269" stroke="#5ed7a6" stroke-width="1.2" marker-end="url(#am)"/>
  <path d="M 610 296 Q 610 330 214 320" fill="none" stroke="#a78bfa" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#a)"/>
  <text x="430" y="330" fill="#a78bfa" font-size="9">first render → pinned back into state as the model sheet</text>

  <!-- lane 3: Veo -->
  <text x="30" y="392" fill="#fbbf24" font-size="11" letter-spacing="2">③ VIDEO IS A TICKET (video.py) — async long-running operation</text>
  <rect x="30" y="406" width="140" height="50" rx="10" fill="none" stroke="#8a8578" stroke-width="1.2"/>
  <text x="100" y="428" fill="#efe9dc" font-size="11.5" text-anchor="middle">generate_videos()</text>
  <text x="100" y="444" fill="#8a8578" font-size="9.5" text-anchor="middle">veo-3.x</text>
  <rect x="240" y="406" width="150" height="50" rx="10" fill="#fbbf24" fill-opacity="0.08" stroke="#fbbf24" stroke-width="1.2"/>
  <text x="315" y="428" fill="#fbbf24" font-size="11.5" text-anchor="middle">operation</text>
  <text x="315" y="444" fill="#8a8578" font-size="9.5" text-anchor="middle">a ticket, not a file</text>
  <rect x="460" y="406" width="170" height="50" rx="10" fill="none" stroke="#8a8578" stroke-width="1.2"/>
  <text x="545" y="428" fill="#efe9dc" font-size="11.5" text-anchor="middle">poll op.done</text>
  <text x="545" y="444" fill="#8a8578" font-size="9.5" text-anchor="middle">every 10 s · ~1 min</text>
  <rect x="700" y="406" width="150" height="50" rx="10" fill="#5ed7a6" fill-opacity="0.08" stroke="#5ed7a6" stroke-width="1.2"/>
  <text x="775" y="428" fill="#5ed7a6" font-size="11.5" text-anchor="middle">beacon_video.mp4</text>
  <text x="775" y="444" fill="#8a8578" font-size="9.5" text-anchor="middle">720p · native audio</text>
  <line x1="170" y1="431" x2="238" y2="431" stroke="#8a8578" stroke-width="1.2" marker-end="url(#a)"/>
  <line x1="390" y1="431" x2="458" y2="431" stroke="#8a8578" stroke-width="1.2" marker-end="url(#a)"/>
  <line x1="630" y1="431" x2="698" y2="431" stroke="#5ed7a6" stroke-width="1.2" marker-end="url(#am)"/>

  <text x="30" y="520" fill="#514b5e" font-size="10">models create · code judges — the gate on progress is deterministic, never an LLM grading itself</text>
</svg>
